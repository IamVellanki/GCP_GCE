name: Terraform Deployment

on:
  push:
    branches:
      - main  # Runs Terraform when changes are pushed to the main branch

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.6  # Change this to match your Terraform version

      - name: Authenticate with GCP
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS" > credentials.json
          export GOOGLE_APPLICATION_CREDENTIALS=$PWD/credentials.json

      - name: Initialize Terraform
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $PWD/credentials.json
        run: terraform init

      - name: Apply Terraform Changes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $PWD/credentials.json
        run: |
          terraform apply -auto-approve
