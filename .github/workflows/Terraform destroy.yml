name: Terraform Destroy

on:
  workflow_dispatch:  # Allows manual execution from GitHub Actions

permissions:
  contents: read

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.6  # Change this to your Terraform version

      - name: Authenticate with GCP
        env:
          GOOGLE_CLOUD_KEYFILE_JSON: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Initialize Terraform
        run: terraform init

      - name: Destroy Terraform Resources
        env:
          GOOGLE_CLOUD_KEYFILE_JSON: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
          terraform destroy -auto-approve -var="GCP_CREDENTIALS=$(cat credentials.json)"
